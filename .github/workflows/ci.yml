name: CI

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  api-gateway:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: clinical-workflow-orchestrator/package-lock.json

      - name: Install dependencies
        working-directory: clinical-workflow-orchestrator
        run: npm install

      - name: Build API gateway
        working-directory: clinical-workflow-orchestrator
        run: npm run build --workspace @clinical-workflow-orchestrator/api-gateway

  workflow-engine:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install LLM gateway package
        run: python -m pip install ./clinical-workflow-orchestrator/packages/llm-gateway

      - name: Install workflow engine package
        run: python -m pip install ./clinical-workflow-orchestrator/apps/workflow-engine

      - name: Verify workflow engine import path
        env:
          LLM_PROVIDER: anthropic
          ANTHROPIC_API_KEY: test-key
        run: python -c "from app.main import app; print(app.title)"
