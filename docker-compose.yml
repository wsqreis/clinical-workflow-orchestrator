services:
  api-gateway:
    image: node:22-alpine
    working_dir: /workspace/apps/api-gateway
    command: sh -lc "npm install --workspaces --include-workspace-root && npm run dev:api"
    environment:
      PORT: 3000
    ports:
      - "3000:3000"
    volumes:
      - ./:/workspace

  workflow-engine:
    image: python:3.12-slim
    working_dir: /workspace/apps/workflow-engine
    command: sh -lc "python -m pip install . && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    volumes:
      - ./:/workspace

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: clinical_workflows
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
