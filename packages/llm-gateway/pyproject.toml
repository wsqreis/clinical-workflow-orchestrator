[project]
name = "clinical-llm-gateway"
version = "0.1.0"
description = "Provider abstraction for clinical workflow model access"
requires-python = ">=3.9"
dependencies = [
  "anthropic>=0.72.0,<1.0.0",
  "openai>=1.82.0,<2.0.0",
  "httpx>=0.28.1,<0.29.0",
  "pydantic>=2.11.4,<3.0.0"
]

[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"
